<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog | Espacio Interior</title>
  <meta name="description" content="Artículos sobre terapia transpersonal, ansiedad, mindfulness y desarrollo interior.">
  <link rel="canonical" href="https://tudominio.com/blog/">
  <meta property="og:title" content="Blog | Espacio Interior">
  <meta property="og:description" content="Artículos sobre terapia transpersonal, ansiedad, mindfulness y desarrollo interior.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://tudominio.com/blog/">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <header class="site-header">
    <a class="logo" href="../index.html">Espacio Interior</a>
    <nav>
      <a href="../index.html">Inicio</a>
      <a href="index.html">Blog</a>
    </nav>
  </header>

  <main class="page">
    <p class="eyebrow">Blog</p>
    <h1>Artículos y recursos</h1>
    <p class="lead">Cada artículo tiene su propio HTML para SEO y carga el contenido desde un archivo .txt.</p>

    <section id="blog-list" class="post-grid"></section>
  </main>

  <script>
    const contenedor = document.getElementById("blog-list");

    async function cargarArticulos() {
      try {
        const respuesta = await fetch("../blog.json");
        if (!respuesta.ok) {
          throw new Error("No se pudo cargar blog.json");
        }

        const articulos = await respuesta.json();

        contenedor.innerHTML = articulos.map(articulo => `
          <a class="post-card" href="${articulo.url}">
            <img 
              class="post-card-img" 
              src="${articulo.imagen}" 
              alt="${articulo.titulo}"
              loading="lazy"
            >

            <div class="post-card-body">
              <p class="post-category">${articulo.categoria}</p>
              <h2>${articulo.titulo}</h2>
              <p>${articulo.descripcion}</p>
              <span class="post-date">📅 ${articulo.fecha}</span>
              <span class="read-more">Leer artículo →</span>
            </div>
          </a>
        `).join("");

      } catch (error) {
        contenedor.innerHTML = `
          <p>No se pudieron cargar los artículos. Revisá que exista el archivo <strong>blog.json</strong>.</p>
        `;
        console.error(error);
      }
    }

    cargarArticulos();
  </script>
</body>
</html>
