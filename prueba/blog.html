<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog | Espacio Transpersonal</title>
  <meta name="description" content="Artículos publicados en Markdown." />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html">Espacio Transpersonal</a>
    <nav>
      <a href="index.html">Inicio</a>
      <a href="blog.html">Blog</a>
    </nav>
  </header>

  <main class="section narrow">
    <p class="eyebrow">Blog</p>
    <h1>Artículos</h1>
    <p>Estos artículos se cargan desde archivos Markdown.</p>
    <div id="posts-list" class="post-list"></div>
  </main>

  <footer class="site-footer">
    <p>© 2026 Espacio Transpersonal</p>
  </footer>

  <script src="assets/posts.js"></script>
  <script>
    const list = document.getElementById('posts-list');

    posts.forEach(post => {
      const card = document.createElement('article');
      card.className = 'post-card';
      card.innerHTML = `
        <p class="post-date">${post.fecha}</p>
        <h2>${post.titulo}</h2>
        <p>${post.descripcion}</p>
        <a class="text-link" href="post.html?articulo=${post.archivo}">Leer artículo →</a>
      `;
      list.appendChild(card);
    });
  </script>
</body>
</html>
